<text x="72" y="404" class="label">FinRobot decision mix across 85 candidate rows</text>
<rect x="100" y="430" width="749.6" height="42" rx="10" fill="#10b981" opacity="0.86"/>
<text x="114" y="457" class="small">keep 54</text>
