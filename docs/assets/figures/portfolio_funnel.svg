<rect x="1197.8235294117646" y="430" width="97.2" height="42" rx="10" fill="#e11d48" opacity="0.86"/>
<text x="1211.8235294117646" y="457" class="small">reject 7</text>
<rect x="72" y="532" width="1460" height="44" rx="14" fill="#f8fafc" stroke="#dbe4ee"/>
<text x="94" y="560" class="small">The final portfolio combines a fixed QQQ sleeve with the stock basket; the funnel explains construction, not causal attribution.</text>
