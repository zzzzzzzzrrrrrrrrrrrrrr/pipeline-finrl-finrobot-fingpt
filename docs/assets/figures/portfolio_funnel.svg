  </style>
<rect width="1600" height="650" fill="#f7fafc"/>
<rect x="34" y="30" width="1532" height="582" rx="30" fill="#ffffff" filter="url(#shadow)"/>
<text x="72" y="84" class="title">Portfolio Construction Funnel</text>
<text x="72" y="112" class="sub">Counts are read from result files. The diagram shows narrowing, gating, sentiment overlay, and final sleeve construction.</text>
